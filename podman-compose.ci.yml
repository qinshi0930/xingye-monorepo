version: '3.8'

# CI/验证环境 - 部署前全面验证（封闭多阶段构建模式）
# 使用方式: podman-compose -f podman-compose.ci.yml up --abort-on-container-exit
#
# 架构说明:
# - 使用 Dockerfile 多阶段构建，与部署流程保持一致
# - 不再使用卷挂载源代码，真正的封闭环境
# - CI 镜像包含 lint、type-check、test:unit、build 步骤
# - 集成测试在此容器内运行，连接 postgres 和 redis 服务

services:
  # 验证容器（使用 Dockerfile ci target 构建）
  validator:
    build:
      context: .
      dockerfile: Dockerfile
      target: ci
    image: localhost/xingye-ci-validator:latest
    container_name: xingye-ci-validator
    env_file:
      - .env
      - apps/web/.env.local
    environment:
      - NODE_ENV=test
      - CI=true
      # 覆盖本地开发配置，使用 CI 容器网络服务
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-xingye}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - POSTGRES_DB=${POSTGRES_DB:-xingye_test}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-xingye}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-xingye_test}?sslmode=disable
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # 覆盖默认 CMD，运行集成测试
    command: >
      sh -c "echo '=== [5/5] 集成测试 ===' &&
             pnpm test:integration &&
             echo 'All checks passed!'"
    networks:
      - ci-network

  redis:
    image: redis:alpine
    container_name: xingye-ci-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      ci-network:
        aliases:
          - redis

  postgres:
    image: postgres:alpine
    container_name: xingye-ci-postgres
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - POSTGRES_DB=${POSTGRES_DB:-xingye_test}
      - POSTGRES_USER=${POSTGRES_USER:-xingye}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xingye} -d ${POSTGRES_DB:-xingye_test}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      ci-network:
        aliases:
          - postgres

networks:
  ci-network:
    driver: bridge
