version: '3.8'

# CI/验证环境 - 部署前全面验证
# 使用方式: podman-compose -f podman-compose.ci.yml up --abort-on-container-exit

services:
  # 验证容器
  validator:
    image: node:20-alpine
    container_name: xingye-ci-validator
    working_dir: /app
    env_file:
      - .env
      - apps/web/.env.local
    environment:
      - NODE_ENV=test
      - CI=true
      # 覆盖本地开发配置，使用 CI 容器网络服务
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-xingye}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - POSTGRES_DB=${POSTGRES_DB:-master_db}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-xingye}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-master_db}?sslmode=disable
    volumes:
      - .:/app:Z
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      sh -c "npm install -g pnpm &&
             pnpm config set store-dir /tmp/pnpm-store &&
             pnpm install --frozen-lockfile &&
             echo '=== [1/6] 代码检查 (lint) ===' &&
             pnpm lint &&
             echo '=== [2/6] 类型检查 (type-check) ===' &&
             pnpm type-check &&
             echo '=== [3/6] 单元测试 ===' &&
             pnpm test:unit &&
             echo '=== [4/6] 构建 ===' &&
             pnpm build &&
             echo '=== [5/6] 集成测试 ===' &&
             pnpm test:integration &&
             echo 'All checks passed!'"
    networks:
      - ci-network

  redis:
    image: redis:alpine
    container_name: xingye-ci-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      ci-network:
        aliases:
          - redis

  postgres:
    image: postgres:alpine
    container_name: xingye-ci-postgres
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - POSTGRES_DB=${POSTGRES_DB:-xingye_test}
      - POSTGRES_USER=${POSTGRES_USER:-xingye}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xingye} -d ${POSTGRES_DB:-xingye_test}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      ci-network:
        aliases:
          - postgres

networks:
  ci-network:
    driver: bridge
