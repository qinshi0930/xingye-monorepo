version: '3.8'

services:
  app:
    image: node:20-alpine
    container_name: next-fullstack-template-dev
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - CI=true
    volumes:
      # 挂载整个项目目录
      - .:/app:Z
    command: >
      sh -c "npm install -g pnpm &&
             pnpm config set store-dir /tmp/pnpm-store &&
             pnpm install &&
             pnpm dev"
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      - redis
      - postgres
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: next-fullstack-redis-dev
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      app-network:
        aliases:
          - redis

  postgres:
    image: postgres:alpine
    container_name: next-fullstack-postgres-dev
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      app-network:
        aliases:
          - postgres

networks:
  app-network:
    driver: bridge
